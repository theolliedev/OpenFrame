services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openframe
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DOCKER_DB_HOST: postgres
      DOCKER_DB_PORT: '5432'
    volumes:
      - storage-data:/app/storage
    networks:
      - openframe
      - caddy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'work_mem=16MB'
      - '-c'
      - 'effective_cache_size=1GB'
      - '-c'
      - 'maintenance_work_mem=128MB'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - openframe
    restart: unless-stopped

networks:
  openframe:
    driver: bridge
  caddy:
    external: true

volumes:
  postgres-data:
  storage-data:
